<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>{% if session.get('site_id') == 5 %}🎂{% elif session.get('site_id') == 4 %}🏠{% else %}✂️{% endif %}</text></svg>">
    <title>Carrossel de Imagens | {{ cliente.nome_fantasia }}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: {{ cores.cor_primaria | default('#6366f1') }};
            --secondary: {{ cores.cor_secundaria | default('#764ba2') }};
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand { display: flex; align-items: center; gap: 12px; }

        .logo-text {
            font-size: 18px; font-weight: 700; font-family: 'Outfit', sans-serif;
            color: var(--text-main); display: flex; align-items: center; gap: 8px;
        }

        .logo-text i { font-size: 20px; color: var(--primary); }

        .nav-links { display: flex; gap: 8px; }

        .nav-link {
            background-color: var(--bg-color); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 16px; border-radius: 8px;
            text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px;
        }
        .nav-link:hover { border-color: var(--primary); color: var(--primary); }

        .container {
            max-width: 900px; width: 100%; margin: 40px auto; padding: 0 24px; flex-grow: 1;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800;
            margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
        }
        .panel-title i { color: var(--primary); }

        .card {
            background-color: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; margin-bottom: 24px;
        }

        .image-upload-area {
            border: 2px dashed var(--border); border-radius: 12px; padding: 40px;
            text-align: center; cursor: pointer; transition: all 0.2s ease; margin-bottom: 20px;
        }
        .image-upload-area:hover { border-color: var(--primary); background-color: rgba(99, 102, 241, 0.05); }
        .image-upload-area i { font-size: 32px; color: var(--primary); margin-bottom: 12px; }

        .image-preview-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; margin-top: 16px;
        }
        .image-preview-item {
            position: relative; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }
        .image-preview-img-container {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
        }
        .image-preview-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .btn {
            padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; font-family: inherit;
        }
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #059669; }

        .toast-message {
            position: fixed; top: 24px; right: 24px; padding: 16px 24px;
            border-radius: 8px; color: white; font-weight: 600; font-size: 14px;
            z-index: 1001; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="logo-text">
                <i class="fa-solid fa-images"></i>
                <span>Carrossel de Imagens - {{ cliente.nome_fantasia }}</span>
            </div>
        </div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>
        </div>
    </header>

    <div class="container">
        <div class="panel-title">
            <i class="fa-solid fa-images"></i> Configurar Carrossel da Página Inicial
        </div>

        <div class="card">
            <div id="uploadSection">
                <label style="font-size: 13px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 8px;">Upload de Imagens para o Carrossel (Máximo: 10 fotos)</label>
                
                <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p style="font-weight: 600; margin-bottom: 5px;">Clique aqui para selecionar as imagens</p>
                    <p style="font-size: 12px; color: var(--text-muted);">Formatos aceitos: JPG, PNG. Recomendado: 1920x800 pixels.</p>
                    <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                </div>
                
                <div id="infoExistentes" style="color: var(--text-muted); font-size: 13px; margin-bottom: 10px;"></div>
                
                <div id="imagePreviewContainer" class="image-preview-grid" style="margin-bottom: 24px;"></div>
                
                <div>
                    <button class="btn btn-success" onclick="salvarImagens()"><i class="fa-solid fa-cloud-arrow-up"></i> Salvar e Atualizar Carrossel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-message" style="display: none;"></div>

    <script>
        const empresaId = {{ session.get('empresa_id', 1) }};
        const siteId = {{ session.get('site_id', 1) }};
        let arquivosSelecionados = [];
        let imagensIdsExistentes = [];

        function mostrarMensagem(msg, tipo) {
            const toast = document.getElementById('toast');
            toast.style.background = tipo === 'sucesso' ? 'var(--success)' : 'var(--danger)';
            toast.innerHTML = (tipo === 'sucesso' ? '<i class="fa-solid fa-check"></i> ' : '<i class="fa-solid fa-xmark"></i> ') + msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function carregarImagensExistentes() {
            arquivosSelecionados = [];
            imagensIdsExistentes = [];
            document.getElementById('imagePreviewContainer').innerHTML = '';
            document.getElementById('infoExistentes').innerHTML = '';
            
            fetch('/admin/api/carrossel/imagens/listar')
                .then(res => res.json())
                .then(data => {
                    if(data.sucesso) {
                        imagensIdsExistentes = data.imagens_ids || [];
                        renderizarImagensExistentes(imagensIdsExistentes);
                    }
                })
                .catch(() => mostrarMensagem('Erro ao obter imagens do servidor.', 'erro'));
        }

        function renderizarImagensExistentes(imagensIds) {
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';
            
            if(imagensIds && imagensIds.length > 0) {
                document.getElementById('infoExistentes').innerHTML = `<i class="fa-solid fa-circle-info"></i> Seu site possui ${imagensIds.length} imagem(ns) no carrossel de fotos.`;
                
                imagensIds.forEach(idx => {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item';
                    
                    const imgUrl = `/img/carrossel/${empresaId}/${siteId}/${idx}`;
                    
                    div.innerHTML = `
                        <div class="image-preview-img-container">
                            <img src="${imgUrl}" alt="Foto ${idx}">
                            <button onclick="excluirImagemCarrossel(event, ${idx})" style="position: absolute; top: 4px; right: 4px; background: rgba(239, 68, 68, 0.9); border: none; border-radius: 50%; color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px;" title="Excluir imagem">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } else {
                document.getElementById('infoExistentes').innerHTML = '<i class="fa-solid fa-circle-info"></i> Nenhuma imagem cadastrada no carrossel. O site exibirá o cabeçalho padrão.';
            }
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            if(!files.length) return;
            
            const totalDisponivel = 10 - imagensIdsExistentes.length;
            if(files.length > totalDisponivel) {
                mostrarMensagem(`Você só pode carregar mais ${totalDisponivel} imagem(ns). Limite total: 10.`, 'erro');
                return;
            }
            
            arquivosSelecionados = Array.from(files);
            
            // Render previews for selected files
            const container = document.getElementById('imagePreviewContainer');
            
            // Clear previous previews that weren't saved
            document.querySelectorAll('.preview-novo').forEach(el => el.remove());
            
            arquivosSelecionados.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item preview-novo';
                    div.style.borderColor = 'var(--primary)';
                    
                    div.innerHTML = `
                        <div class="image-preview-img-container">
                            <img src="${e.target.result}" alt="Preview ${index}">
                            <button onclick="removerFileLocal(${index})" style="position: absolute; top: 4px; right: 4px; background: rgba(239, 68, 68, 0.9); border: none; border-radius: 50%; color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px;" title="Remover da lista">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <div style="font-size: 10px; padding: 4px; text-align: center; color: var(--primary); font-weight: 600; background: rgba(99, 102, 241, 0.1);">Nova foto</div>
                    `;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function removerFileLocal(index) {
            arquivosSelecionados.splice(index, 1);
            // Re-render previews
            document.querySelectorAll('.preview-novo').forEach(el => el.remove());
            
            const container = document.getElementById('imagePreviewContainer');
            arquivosSelecionados.forEach((file, idx) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item preview-novo';
                    div.style.borderColor = 'var(--primary)';
                    
                    div.innerHTML = `
                        <div class="image-preview-img-container">
                            <img src="${e.target.result}" alt="Preview ${idx}">
                            <button onclick="removerFileLocal(${idx})" style="position: absolute; top: 4px; right: 4px; background: rgba(239, 68, 68, 0.9); border: none; border-radius: 50%; color: white; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px;" title="Remover da lista">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <div style="font-size: 10px; padding: 4px; text-align: center; color: var(--primary); font-weight: 600; background: rgba(99, 102, 241, 0.1);">Nova foto</div>
                    `;
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        function salvarImagens() {
            if(arquivosSelecionados.length === 0) {
                mostrarMensagem('Selecione ao menos uma nova foto para salvar.', 'erro');
                return;
            }
            
            const formData = new FormData();
            arquivosSelecionados.forEach((file, index) => {
                formData.append(`imagem${index+1}`, file);
            });
            
            fetch('/admin/api/carrossel/imagens', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    mostrarMensagem('Imagens do carrossel salvas com sucesso!', 'sucesso');
                    carregarImagensExistentes();
                } else {
                    mostrarMensagem(data.erro || 'Erro ao enviar as imagens.', 'erro');
                }
            })
            .catch(() => mostrarMensagem('Falha na comunicação com o servidor.', 'erro'));
        }

        function excluirImagemCarrossel(event, idx) {
            event.stopPropagation();
            if(!confirm('Tem certeza de que deseja excluir esta imagem do carrossel?')) return;
            
            fetch(`/admin/api/carrossel/imagens/${idx}`, {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    mostrarMensagem('Imagem removida do carrossel.', 'sucesso');
                    carregarImagensExistentes();
                } else {
                    mostrarMensagem('Erro ao remover imagem.', 'erro');
                }
            })
            .catch(() => mostrarMensagem('Erro ao remover imagem do servidor.', 'erro'));
        }

        // Inicializar
        carregarImagensExistentes();
    </script>
</body>
</html>
