<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizar Entregas | {{ cliente.nome_fantasia }}</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: {{ cores.cor_primaria | default('#6366f1') }};
            --secondary: {{ cores.cor_secundaria | default('#764ba2') }};
            --border: #334155;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            max-height: 60px;
            max-width: 250px;
            object-fit: contain;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text i {
            font-size: 20px;
            color: var(--primary);
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .welcome-msg {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .welcome-msg strong {
            color: var(--text-main);
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .logout-btn {
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background-color: #e11d48;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 40px auto;
            padding: 0 24px;
            flex-grow: 1;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .panel-title i {
            color: var(--primary);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title i {
            color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 42px;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--secondary);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            font-family: 'Outfit', sans-serif;
            color: var(--text-muted);
            font-weight: 700;
            background-color: rgba(255, 255, 255, 0.02);
        }

        td {
            color: var(--text-main);
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
        }

        .filter-group input {
            padding: 8px 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
        }

        .toast-message {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 1001;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-100%) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            header {
                padding: 16px 24px;
                flex-direction: column;
                gap: 16px;
            }
            .user-nav {
                flex-direction: column;
                width: 100%;
            }
            .nav-links {
                justify-content: center;
                width: 100%;
            }
            th, td {
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            {% if cliente.logo_url %}
                <img src="{{ cliente.logo_url }}" class="logo-img" alt="Logo">
            {% else %}
                <div class="logo-text">
                    <i class="fa-solid fa-truck"></i>
                    <span>{{ cliente.nome_fantasia }}</span>
                </div>
            {% endif %}
        </div>
        
        <div class="user-nav">
            <span class="welcome-msg">Olá, <strong>{{ admin_nome }}</strong></span>
            
            <div class="nav-links">
                <a href="/admin/dashboard" class="nav-link"><i class="fa-solid fa-house"></i> Menu Principal</a>
                <a href="/admin/agenda" class="nav-link"><i class="fa-regular fa-calendar-days"></i> Agenda</a>
                <a href="/admin/servicos" class="nav-link"><i class="fa-solid fa-scissors"></i> Serviços</a>
                <a href="/admin/promocoes" class="nav-link"><i class="fa-solid fa-tags"></i> Promoções</a>
            </div>
            
            <a href="/admin/logout" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
        </div>
    </header>

    <div class="container">
        <div class="panel-title">
            <i class="fa-solid fa-truck"></i> Organizar Entregas do Buffet
        </div>

        <!-- Adicionar Entrega -->
        <div class="card">
            <div class="card-title"><span><i class="fa-solid fa-plus"></i> Registrar Nova Entrega</span></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nome do Cliente</label>
                    <input type="text" id="nomeCliente" placeholder="Ex: Maria Souza">
                </div>
                <div class="form-group">
                    <label>Serviço Contratado</label>
                    <select id="servicoId">
                        <option value="">Selecione um serviço...</option>
                        {% for s in servicos %}
                        <option value="{{ s.id }}">{{ s.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Prazo de Entrega</label>
                    <input type="date" id="prazoEntrega">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Observações</label>
                <textarea id="observacoes" placeholder="Ex: Bolo de chocolate sem glúten, decorações em tons de azul e branco..."></textarea>
            </div>
            <button class="btn btn-success" onclick="adicionarEntrega()"><i class="fa-solid fa-floppy-disk"></i> Salvar Entrega</button>
        </div>

        <!-- Catálogo de Entregas -->
        <div class="card">
            <div class="card-title">
                <span><i class="fa-solid fa-list-check"></i> Próximas Entregas</span>
                <button class="btn btn-primary" onclick="carregarEntregas()"><i class="fa-solid fa-rotate"></i> Atualizar</button>
            </div>
            
            <div class="filter-row">
                <div class="filter-group">
                    <label><i class="fa-solid fa-filter"></i> Filtrar por Data do Prazo:</label>
                    <input type="date" id="filtroPrazo" onchange="carregarEntregas()">
                    <button class="btn btn-primary" style="padding: 6px 12px; font-size: 13px;" onclick="limparFiltro()">Limpar</button>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Serviço</th>
                            <th>Prazo</th>
                            <th>Observações</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="entregasTableBody">
                        <tr>
                            <td colspan="5" class="empty-message"><i class="fa-solid fa-spinner fa-spin"></i> Carregando entregas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast-message" style="display: none;"></div>
    
    <script>
        function mostrarMensagem(msg, tipo) {
            const toast = document.getElementById('toast');
            toast.style.background = tipo === 'sucesso' ? 'var(--success)' : 'var(--danger)';
            toast.innerHTML = (tipo === 'sucesso' ? '<i class="fa-solid fa-circle-check"></i> ' : '<i class="fa-solid fa-circle-xmark"></i> ') + msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function formatarData(dataStr) {
            if (!dataStr) return '-';
            const partes = dataStr.split('-');
            if (partes.length !== 3) return dataStr;
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function carregarEntregas() {
            const filtroPrazo = document.getElementById('filtroPrazo').value;
            let url = '/admin/api/buffet';
            if (filtroPrazo) {
                url += `?prazo=${filtroPrazo}`;
            }

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.sucesso) {
                        renderizarEntregas(data.entregas);
                    } else {
                        mostrarMensagem('Erro ao carregar entregas.', 'erro');
                    }
                })
                .catch(error => {
                    console.error('Erro:', error);
                    mostrarMensagem('Erro de conexão ao carregar entregas.', 'erro');
                });
        }

        function renderizarEntregas(entregas) {
            const body = document.getElementById('entregasTableBody');
            
            if (!entregas || entregas.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="empty-message">Nenhuma entrega agendada.</td></tr>';
                return;
            }

            body.innerHTML = '';
            entregas.forEach(entrega => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${entrega.nome_cliente || ''}</strong></td>
                    <td>${entrega.servico_nome || 'Não especificado'}</td>
                    <td><span style="font-weight: 600; color: var(--primary);"><i class="fa-regular fa-calendar"></i> ${formatarData(entrega.prazo)}</span></td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${entrega.observacoes || ''}">${entrega.observacoes || '-'}</td>
                    <td style="text-align: right;">
                        <button class="btn btn-danger" onclick="excluirEntrega(${entrega.id})"><i class="fa-solid fa-trash-can"></i> Excluir</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function adicionarEntrega() {
            const nome_cliente = document.getElementById('nomeCliente').value.trim();
            const servico_id = document.getElementById('servicoId').value;
            const prazo = document.getElementById('prazoEntrega').value;
            const observacoes = document.getElementById('observacoes').value.trim();

            if (!nome_cliente) {
                mostrarMensagem('Digite o nome do cliente', 'erro');
                return;
            }
            if (!servico_id) {
                mostrarMensagem('Selecione o serviço', 'erro');
                return;
            }
            if (!prazo) {
                mostrarMensagem('Insira o prazo de entrega', 'erro');
                return;
            }

            const novaEntrega = {
                nome_cliente: nome_cliente,
                servico_id: servico_id,
                prazo: prazo,
                observacoes: observacoes
            };

            fetch('/admin/api/buffet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novaEntrega)
            })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    mostrarMensagem('Entrega salva com sucesso!', 'sucesso');
                    document.getElementById('nomeCliente').value = '';
                    document.getElementById('servicoId').value = '';
                    document.getElementById('prazoEntrega').value = '';
                    document.getElementById('observacoes').value = '';
                    carregarEntregas();
                } else {
                    mostrarMensagem('Erro ao salvar entrega.', 'erro');
                }
            })
            .catch(error => {
                mostrarMensagem('Erro de conexão ao salvar entrega.', 'erro');
            });
        }

        function excluirEntrega(id) {
            if (confirm('Tem certeza de que deseja remover esta entrega do cronograma?')) {
                fetch('/admin/api/buffet', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.sucesso) {
                        mostrarMensagem('Entrega excluída com sucesso!', 'sucesso');
                        carregarEntregas();
                    } else {
                        mostrarMensagem('Erro ao excluir entrega.', 'erro');
                    }
                })
                .catch(error => {
                    mostrarMensagem('Erro de conexão ao excluir entrega.', 'erro');
                });
            }
        }

        function limparFiltro() {
            document.getElementById('filtroPrazo').value = '';
            carregarEntregas();
        }

        // Carregamento inicial
        carregarEntregas();
    </script>
</body>
</html>
